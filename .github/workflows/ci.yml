name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versions:
    name: Version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check package.json / tauri.conf.json / Cargo.toml agree
        shell: bash
        run: |
          pkg=$(node -p "require('./package.json').version")
          conf=$(node -p "require('./src-tauri/tauri.conf.json').version")
          cargo=$(grep -m1 -A3 '^\[workspace.package\]' Cargo.toml | grep '^version' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "package.json=$pkg  tauri.conf.json=$conf  Cargo.toml=$cargo"
          if [ "$pkg" != "$conf" ] || [ "$pkg" != "$cargo" ]; then
            echo "::error::version mismatch — keep package.json, tauri.conf.json, and Cargo.toml [workspace.package] in sync"
            exit 1
          fi

  rust:
    name: Rust check + test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: fmt
        run: cargo fmt --all -- --check

      # The `treelens` (Tauri) crate is excluded from every cargo step in this
      # job: its `generate_context!` requires ../ui/dist, which this job never
      # builds. On a cold cache it would recompile and the macro panics. clippy +
      # tests + --selftest for treelens run in the `app` job after the UI build.
      - name: clippy (library crates)
        run: cargo clippy --workspace --exclude treelens --all-targets -- -D warnings

      - name: test (library crates)
        run: cargo test --workspace --exclude treelens

      - name: bench compile check
        run: cargo bench --workspace --exclude treelens --no-run

  ui:
    name: UI typecheck + build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  app:
    name: Tauri build + selftest
    runs-on: windows-2022
    needs: [rust, ui]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Build the frontend first so generate_context! can embed ui/dist.
      - name: Build UI
        run: npm run build

      - name: clippy (Tauri crate)
        run: cargo clippy -p treelens --all-targets -- -D warnings

      - name: Test Tauri crate
        run: cargo test -p treelens

      - name: Self-test (file ops + checksum + compare + stego round-trips)
        run: cargo run -p treelens -- --selftest

      - name: Tauri build (debug)
        run: npx tauri build --debug --no-bundle

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
