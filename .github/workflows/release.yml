name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build + draft release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync tag → version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          Write-Host "Releasing $version"
          # Patch tauri.conf.json + Cargo.toml [workspace.package].version
          $confPath = "src-tauri/tauri.conf.json"
          $conf = Get-Content $confPath -Raw
          $conf = $conf -replace '"version":\s*"[^"]+"', "`"version`": `"$version`""
          Set-Content $confPath $conf -NoNewline
          $cargoPath = "Cargo.toml"
          $cargo = Get-Content $cargoPath -Raw
          $cargo = $cargo -replace '(?ms)(^\[workspace\.package\][\s\S]*?\nversion\s*=\s*")[^"]+("\s*$)', "`${1}$version`${2}"
          Set-Content $cargoPath $cargo -NoNewline
          # Patch package.json too — the in-app version label (__APP_VERSION__)
          # is a Vite define read from package.json at build time, so without
          # this the UI would show the previous version on a fresh release.
          $pkgPath = "package.json"
          $pkg = Get-Content $pkgPath -Raw
          $pkg = $pkg -replace '("version":\s*")[^"]+(")', "`${1}$version`${2}"
          Set-Content $pkgPath $pkg -NoNewline

      - name: Tauri build (release)
        run: npx tauri build

      - name: Stage artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $stage = "release-stage"
          New-Item -ItemType Directory -Force $stage | Out-Null

          # The Cargo workspace puts target/ at the workspace root, not under src-tauri/.
          # Find the binary and the NSIS bundle from either layout.
          $exeCandidates = @(
            "target\release\treelens.exe",
            "src-tauri\target\release\treelens.exe"
          )
          $portableSrc = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $portableSrc) {
            Write-Host "::error::treelens.exe not found. Search:"
            Get-ChildItem -Recurse -Filter "treelens.exe" -ErrorAction SilentlyContinue | Select-Object FullName
            throw "treelens.exe missing"
          }
          $portableDst = "$stage\Treelens-$version-portable.exe"
          Copy-Item $portableSrc $portableDst
          Write-Host "Portable: $portableSrc -> $portableDst"

          $nsisCandidates = @(
            "target\release\bundle\nsis",
            "src-tauri\target\release\bundle\nsis"
          )
          $nsisDir = $nsisCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($nsisDir) {
            Get-ChildItem $nsisDir -Filter "*.exe" | ForEach-Object {
              Copy-Item $_.FullName "$stage\Treelens-$version-setup.exe"
              Write-Host "NSIS: $($_.FullName) -> Treelens-$version-setup.exe"
            }
          } else {
            Write-Host "::warning::NSIS bundle directory not found; release will ship portable EXE only."
          }

          # Checksums for every staged file.
          Get-ChildItem $stage -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content "$stage\SHA256SUMS.txt"
          Get-ChildItem $stage | Format-Table Name, Length

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Treelens ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            release-stage/Treelens-*-portable.exe
            release-stage/Treelens-*-setup.exe
            release-stage/SHA256SUMS.txt
          body: |
            ## Treelens ${{ github.ref_name }}

            A free, open-source disk-space visualizer for Windows.

            ### Downloads
            - **`Treelens-${{ github.ref_name }}-portable.exe`** — the single-file portable build. Download, double-click, scan.
            - **`Treelens-${{ github.ref_name }}-setup.exe`** — NSIS installer (Start menu shortcut, uninstaller).
            - **`SHA256SUMS.txt`** — verify your download.

            ### Windows warnings — this is normal for unsigned builds
            Treelens isn't code-signed yet, so SmartScreen will say "Windows protected your PC" and the UAC prompt will show "Publisher: Unknown."
            Click "More info" → "Run anyway." Source is right here; the SHA-256 file lets you verify the bits.

            ### Notes
            - No telemetry. No network access. Treelens never writes outside its own folder unless you ask.
            - Runs without admin (degraded — some files won't be visible). Click "Relaunch as admin" in the banner for full visibility.
            - The MFT fast path is planned for v0.2; v0.1 uses a parallel-walk scanner that works on any filesystem.
